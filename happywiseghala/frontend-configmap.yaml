apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html
  namespace: happywiseghala
data:
  nginx.conf: |
    server {
      listen 80;
      location / {
        root /usr/share/nginx/html;
        index index.html;
      }
      location /api/ {
        proxy_pass http://flask-service:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }
    }

  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>HappywiseGhala — Stock Manager</title>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
      <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
      <link rel="stylesheet" href="/styles.css">
    </head>
    <body>

    <!-- LOGIN -->
    <div class="login-page" id="login-page">
      <div class="login-box">
        <div class="login-logo"><i class="fa-solid fa-warehouse"></i></div>
        <div class="login-title">HappywiseGhala</div>
        <div class="login-subtitle">Stock & Inventory Manager</div>
        <div class="login-error" id="login-error"><i class="fa-solid fa-circle-xmark"></i> <span id="login-err-msg">Invalid credentials</span></div>
        <div class="login-form">
          <div class="form-group"><label>Username</label>
            <div class="input-wrap"><i class="fa-solid fa-user"></i>
              <input type="text" id="login-username" placeholder="Enter username" onkeypress="if(event.key==='Enter')doLogin()">
            </div>
          </div>
          <div class="form-group"><label>Password</label>
            <div class="input-wrap"><i class="fa-solid fa-lock"></i>
              <input type="password" id="login-password" placeholder="Enter password" onkeypress="if(event.key==='Enter')doLogin()">
            </div>
          </div>
          <button class="login-btn" onclick="doLogin()"><i class="fa-solid fa-right-to-bracket"></i> Sign In</button>
        </div>
        <div class="role-badges">
          <span class="role-badge"><i class="fa-solid fa-crown"></i> Owner</span>
          <span class="role-badge"><i class="fa-solid fa-user-tie"></i> Manager</span>
          <span class="role-badge"><i class="fa-solid fa-boxes-stacked"></i> HappyWise Attendant</span>
        </div>
      </div>
    </div>

    <!-- APP -->
    <div class="app-page" id="app-page">
      <div class="topbar">
        <div class="topbar-left">
          <button class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
          <div class="topbar-logo"><i class="fa-solid fa-warehouse"></i></div>
          <div class="topbar-title">Happywise<span>Ghala</span></div>
        </div>
        <div class="topbar-right">
          <div class="user-info">
            <i class="fa-solid fa-circle-user" style="color:#10b981"></i>
            <span class="user-name" id="topbar-name">—</span>
            <span class="user-role" id="topbar-role">—</span>
          </div>
          <button class="logout-btn" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
        </div>
      </div>
      <div class="body-wrap">
        <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
        <div class="sidebar" id="sidebar">
          <div class="nav-section">Main</div>
          <div class="nav-item active" onclick="showPage('dashboard',event)"><i class="fa-solid fa-chart-pie"></i> Dashboard</div>
          <div class="nav-item" onclick="showPage('products',event)"><i class="fa-solid fa-boxes-stacked"></i> Products</div>
          <div class="nav-item" onclick="showPage('categories',event)"><i class="fa-solid fa-tags"></i> Categories</div>
          <div class="nav-section">Transactions</div>
          <div class="nav-item" onclick="showPage('stockin',event)"><i class="fa-solid fa-truck-ramp-box"></i> Stock In (GRN)</div>
          <div class="nav-item" onclick="showPage('sales',event)"><i class="fa-solid fa-cash-register"></i> Sales (POS)</div>
          <div class="nav-item" onclick="showPage('adjustments',event)"><i class="fa-solid fa-sliders"></i> Adjustments</div>
          <div class="nav-section">Contacts</div>
          <div class="nav-item" onclick="showPage('suppliers',event)"><i class="fa-solid fa-industry"></i> Suppliers</div>
          <div class="nav-item" onclick="showPage('customers',event)"><i class="fa-solid fa-users"></i> Customers</div>
          <div class="nav-section nav-mgmt">Management</div>
          <div class="nav-item nav-reports" onclick="showPage('reports',event)"><i class="fa-solid fa-chart-bar"></i> Reports</div>
          <div class="nav-item nav-staff" onclick="showPage('staff',event)"><i class="fa-solid fa-user-gear"></i> Staff</div>
          <div class="nav-item nav-audit" onclick="showPage('audit',event)"><i class="fa-solid fa-clipboard-list"></i> Audit Log</div>
          <div class="nav-item nav-settings" onclick="showPage('settings',event)"><i class="fa-solid fa-gear"></i> Settings</div>
        </div>

        <div class="main">

          <!-- DASHBOARD -->
          <div class="page active" id="page-dashboard">
            <div class="page-title"><i class="fa-solid fa-chart-pie"></i> Dashboard</div>
            <div class="stats" id="dash-stats">
              <div class="stat-card"><i class="fa-solid fa-boxes-stacked"></i><div class="stat-value" id="d-products">—</div><div class="stat-label">Products</div></div>
              <div class="stat-card"><i class="fa-solid fa-coins" style="color:#fbbf24"></i><div class="stat-value" id="d-cost-val" style="color:#fbbf24">—</div><div class="stat-label">Stock Cost Value (KES)</div></div>
              <div class="stat-card"><i class="fa-solid fa-tag" style="color:#60a5fa"></i><div class="stat-value" id="d-retail-val" style="color:#60a5fa">—</div><div class="stat-label">Retail Value (KES)</div></div>
              <div class="stat-card"><i class="fa-solid fa-cash-register" style="color:#10b981"></i><div class="stat-value" id="d-today" style="color:#10b981">—</div><div class="stat-label">Today's Sales (KES)</div></div>
              <div class="stat-card"><i class="fa-solid fa-calendar-check" style="color:#a78bfa"></i><div class="stat-value" id="d-month" style="color:#a78bfa">—</div><div class="stat-label">Month Sales (KES)</div></div>
              <div class="stat-card"><i class="fa-solid fa-triangle-exclamation" style="color:#fbbf24"></i><div class="stat-value" id="d-low" style="color:#fbbf24">—</div><div class="stat-label">Low Stock Items</div></div>
              <div class="stat-card"><i class="fa-solid fa-ban" style="color:#f87171"></i><div class="stat-value" id="d-out" style="color:#f87171">—</div><div class="stat-label">Out of Stock</div></div>
              <div class="stat-card"><i class="fa-solid fa-clock-rotate-left" style="color:#fb923c"></i><div class="stat-value" id="d-expiry" style="color:#fb923c">—</div><div class="stat-label">Expiring ≤30 Days</div></div>
            </div>
            <div class="charts-row">
              <div class="chart-card">
                <h4><i class="fa-solid fa-chart-bar"></i> Sales — Last 7 Days (KES)</h4>
                <div class="chart-container"><canvas id="salesTrendChart"></canvas></div>
              </div>
              <div class="chart-card">
                <h4><i class="fa-solid fa-chart-pie"></i> Top 5 Products (This Month)</h4>
                <div class="chart-container"><canvas id="topProductsChart"></canvas></div>
              </div>
            </div>
            <div class="card">
              <h3><i class="fa-solid fa-triangle-exclamation" style="color:#fbbf24"></i> Low Stock Alerts</h3>
              <div class="overflow-x">
                <table>
                  <thead><tr><th>Product</th><th>Category</th><th>Unit</th><th>Current Stock</th><th>Reorder Level</th><th>Status</th></tr></thead>
                  <tbody id="low-stock-table"></tbody>
                </table>
              </div>
            </div>
            <div class="card">
              <h3><i class="fa-solid fa-clock-rotate-left"></i> Recent Sales</h3>
              <div class="overflow-x">
                <table>
                  <thead><tr><th>Invoice</th><th>Customer</th><th>Amount (KES)</th><th>Method</th><th>Status</th><th>Date</th></tr></thead>
                  <tbody id="recent-sales-table"></tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- PRODUCTS -->
          <div class="page" id="page-products">
            <div class="page-title"><i class="fa-solid fa-boxes-stacked"></i> Products</div>
            <div class="card" id="product-form-card">
              <h3 id="product-form-title"><i class="fa-solid fa-plus"></i> Add Product</h3>
              <div class="alert" id="alert-product"></div>
              <input type="hidden" id="product-edit-id">
              <div class="form-row">
                <div class="form-group" style="flex:2 1 240px"><label>Product Name *</label><input type="text" id="p-name" placeholder="e.g. Maize Flour 2kg"></div>
                <div class="form-group"><label>SKU / Code</label><input type="text" id="p-sku" placeholder="e.g. MF001"></div>
                <div class="form-group"><label>Barcode</label><input type="text" id="p-barcode" placeholder="Optional"></div>
              </div>
              <div class="form-row">
                <div class="form-group"><label>Category</label><select id="p-category"><option value="">— No Category —</option></select></div>
                <div class="form-group"><label>Unit</label>
                  <select id="p-unit">
                    <option value="pcs">Pieces (pcs)</option>
                    <option value="kg">Kilograms (kg)</option>
                    <option value="ltrs">Litres (ltrs)</option>
                    <option value="bags">Bags</option>
                    <option value="crates">Crates</option>
                    <option value="cartons">Cartons</option>
                    <option value="dozens">Dozens</option>
                    <option value="boxes">Boxes</option>
                    <option value="packets">Packets</option>
                    <option value="rolls">Rolls</option>
                  </select>
                </div>
                <div class="form-group"><label>Reorder Level</label><input type="number" id="p-reorder" value="10" min="0"></div>
              </div>
              <div class="form-row">
                <div class="form-group"><label>Buying Price (KES)</label><input type="number" id="p-buy" value="0" min="0" step="0.01"></div>
                <div class="form-group"><label>Selling Price (KES)</label><input type="number" id="p-sell" value="0" min="0" step="0.01"></div>
                <div class="form-group"><label>Expiry Date</label><input type="date" id="p-expiry"></div>
              </div>
              <div style="display:flex;gap:8px">
                <button class="btn" onclick="saveProduct()"><i class="fa-solid fa-floppy-disk"></i> <span id="product-btn-label">Save Product</span></button>
                <button class="btn btn-red" id="cancel-product-edit" style="display:none" onclick="cancelProductEdit()"><i class="fa-solid fa-xmark"></i> Cancel</button>
              </div>
            </div>
            <div class="card">
              <h3><i class="fa-solid fa-list"></i> All Products</h3>
              <div class="search-bar">
                <input type="text" id="search-products" placeholder="Search products..." oninput="filterProducts()">
                <select id="filter-product-cat" onchange="filterProducts()"><option value="">All Categories</option></select>
                <select id="filter-product-stock" onchange="filterProducts()">
                  <option value="">All Stock Levels</option>
                  <option value="ok">In Stock</option>
                  <option value="low">Low Stock</option>
                  <option value="out">Out of Stock</option>
                </select>
                <button class="btn btn-yellow btn-sm" onclick="exportProductsExcel()"><i class="fa-solid fa-file-excel"></i> Export</button>
              </div>
              <div class="overflow-x">
                <table>
                  <thead><tr><th>Name</th><th>SKU</th><th>Category</th><th>Unit</th><th>Buy (KES)</th><th>Sell (KES)</th><th>Stock</th><th>Reorder</th><th>Expiry</th><th>Actions</th></tr></thead>
                  <tbody id="products-table"></tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- CATEGORIES -->
          <div class="page" id="page-categories">
            <div class="page-title"><i class="fa-solid fa-tags"></i> Categories</div>
            <div class="card">
              <h3><i class="fa-solid fa-plus"></i> Add Category</h3>
              <div class="alert" id="alert-category"></div>
              <div class="form-row">
                <div class="form-group" style="flex:2 1 200px"><label>Category Name *</label><input type="text" id="cat-name" placeholder="e.g. Beverages"></div>
                <div class="form-group" style="flex:3 1 300px"><label>Description</label><input type="text" id="cat-desc" placeholder="Optional"></div>
              </div>
              <button class="btn" onclick="addCategory()"><i class="fa-solid fa-plus"></i> Add Category</button>
            </div>
            <div class="card">
              <h3><i class="fa-solid fa-list"></i> All Categories</h3>
              <table>
                <thead><tr><th>Name</th><th>Description</th><th>Actions</th></tr></thead>
                <tbody id="categories-table"></tbody>
              </table>
            </div>
          </div>

          <!-- STOCK IN -->
          <div class="page" id="page-stockin">
            <div class="page-title"><i class="fa-solid fa-truck-ramp-box"></i> Stock In — Goods Received (GRN)</div>
            <div class="card">
              <h3><i class="fa-solid fa-plus"></i> New GRN</h3>
              <div class="alert" id="alert-grn"></div>
              <div class="form-row">
                <div class="form-group"><label>Supplier</label><select id="grn-supplier"><option value="">— Walk-in / Unknown —</option></select></div>
                <div class="form-group"><label>GRN / Invoice No.</label><input type="text" id="grn-number" placeholder="Auto-generated if blank"></div>
                <div class="form-group"><label>Payment Status</label>
                  <select id="grn-payment">
                    <option value="unpaid">Unpaid</option>
                    <option value="partial">Partial</option>
                    <option value="paid">Paid</option>
                  </select>
                </div>
                <div class="form-group" style="flex:1 1 100%"><label>Notes</label><input type="text" id="grn-notes" placeholder="Optional"></div>
              </div>
              <h3 style="margin-bottom:10px"><i class="fa-solid fa-list"></i> Items</h3>
              <div class="receipt-scan-bar">
                <label class="btn btn-sm btn-purple" style="cursor:pointer">
                  <i class="fa-solid fa-receipt"></i> Upload Receipt
                  <input type="file" id="receipt-file" accept="image/*" style="display:none" onchange="previewReceipt(this)">
                </label>
                <span id="receipt-filename" style="font-size:0.82em;color:#9ca3af"></span>
                <button class="btn btn-sm btn-green" id="scan-btn" onclick="scanReceipt()" style="display:none">
                  <i class="fa-solid fa-wand-magic-sparkles"></i> Scan &amp; Fill
                </button>
                <span id="scan-status" style="font-size:0.82em"></span>
              </div>
              <div class="overflow-x">
                <table>
                  <thead><tr><th>Product *</th><th>Qty *</th><th>Buy Price (KES) *</th><th>Expiry Date</th><th></th></tr></thead>
                  <tbody id="grn-items-body"></tbody>
                </table>
              </div>
              <button class="btn btn-blue btn-sm" onclick="addGrnRow()" style="margin-top:10px"><i class="fa-solid fa-plus"></i> Add Item</button>
              <div style="margin-top:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
                <div style="font-size:0.9em;color:#c4b5fd">Total: <strong id="grn-total" style="color:#fff">KES 0.00</strong></div>
                <button class="btn" onclick="saveGrn()"><i class="fa-solid fa-floppy-disk"></i> Save GRN & Update Stock</button>
              </div>
            </div>

            <!-- RECEIPT SCAN RESULTS CARD -->
            <div class="card" id="scan-result-card" style="display:none">
              <h3><i class="fa-solid fa-receipt"></i> Receipt Scan Results</h3>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
                <div class="form-group" style="margin:0">
                  <label><i class="fa-solid fa-building"></i> Header — Supplier Info</label>
                  <textarea id="scan-header" class="scan-textarea" rows="5" readonly></textarea>
                </div>
                <div class="form-group" style="margin:0">
                  <label><i class="fa-solid fa-file-invoice-dollar"></i> Footer — Totals &amp; Payment</label>
                  <textarea id="scan-footer" class="scan-textarea" rows="5" readonly></textarea>
                </div>
              </div>
              <h4 style="margin-bottom:8px"><i class="fa-solid fa-list"></i> Items / Particulars</h4>
              <div class="overflow-x">
                <table>
                  <thead><tr><th>Item / Particular</th><th>Qty</th><th>Unit Price (KES)</th><th>Total (KES)</th><th></th></tr></thead>
                  <tbody id="scan-items-body"></tbody>
                  <tfoot>
                    <tr>
                      <td colspan="3" style="text-align:right;font-weight:600;padding:8px 12px">Grand Total</td>
                      <td id="scan-grand-total" style="font-weight:600;padding:8px 12px;color:#10b981"></td>
                      <td></td>
                    </tr>
                  </tfoot>
                </table>
              </div>
              <button class="btn btn-sm btn-green" onclick="addAllToGrn()" style="margin-top:10px">
                <i class="fa-solid fa-plus"></i> Add All to GRN
              </button>
            </div>

            <div class="card">
              <h3><i class="fa-solid fa-history"></i> GRN History</h3>
              <div class="search-bar">
                <input type="text" id="search-grn" placeholder="Search GRN..." oninput="filterGrn()">
                <button class="btn btn-yellow btn-sm" onclick="exportGrnExcel()"><i class="fa-solid fa-file-excel"></i> Export</button>
              </div>
              <div class="overflow-x">
                <table>
                  <thead><tr><th>GRN #</th><th>Supplier</th><th>Total (KES)</th><th>Payment</th><th>Received By</th><th>Date</th><th>Actions</th></tr></thead>
                  <tbody id="grn-table"></tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- SALES (POS) -->
          <div class="page" id="page-sales">
            <div class="page-title"><i class="fa-solid fa-cash-register"></i> Sales — Point of Sale</div>
            <div style="display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start" id="pos-layout">
              <div>
                <div class="card">
                  <h3><i class="fa-solid fa-magnifying-glass"></i> Find Product</h3>
                  <div class="pos-search-wrap">
                    <input type="text" id="pos-search" placeholder="Type to search — results appear from first letter…"
                      oninput="posSearch()"
                      onfocus="posSearch()"
                      onkeydown="posKeyNav(event)"
                      autocomplete="off">
                    <div id="pos-dropdown" class="pos-dropdown"></div>
                  </div>
                  <div id="pos-added-flash" class="pos-added-flash"></div>
                </div>
                <div class="card">
                  <h3><i class="fa-solid fa-cart-shopping"></i> Cart</h3>
                  <div class="overflow-x">
                    <table class="cart-table">
                      <thead><tr><th>Product</th><th>Unit Price (KES)</th><th>Qty</th><th>Total (KES)</th><th></th></tr></thead>
                      <tbody id="cart-body"></tbody>
                    </table>
                  </div>
                  <div style="text-align:right;margin-top:12px;font-size:1em;color:#fff">
                    Total: <strong id="cart-total" style="color:#10b981;font-size:1.2em">KES 0.00</strong>
                  </div>
                </div>
              </div>
              <div class="card" style="position:sticky;top:80px">
                <h3><i class="fa-solid fa-receipt"></i> Checkout</h3>
                <div class="alert" id="alert-sale"></div>
                <div class="form-group" style="margin-bottom:12px"><label>Customer</label>
                  <select id="sale-customer"><option value="">Walk-in Customer</option></select>
                </div>
                <div class="form-group" style="margin-bottom:12px"><label>Payment Method</label>
                  <select id="sale-method">
                    <option value="cash">Cash</option>
                    <option value="mpesa">M-Pesa</option>
                    <option value="bank">Bank Transfer</option>
                    <option value="credit">On Credit</option>
                  </select>
                </div>
                <div class="form-group" style="margin-bottom:12px"><label>Notes</label>
                  <input type="text" id="sale-notes" placeholder="Optional">
                </div>
                <div style="background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:8px;padding:12px;margin-bottom:14px;text-align:center">
                  <div style="font-size:0.78em;color:#6b7280;margin-bottom:4px">TOTAL</div>
                  <div style="font-size:2em;font-weight:800;color:#10b981" id="checkout-total">KES 0.00</div>
                </div>
                <button class="btn" style="width:100%;justify-content:center;font-size:0.95em" onclick="completeSale()">
                  <i class="fa-solid fa-circle-check"></i> Complete Sale
                </button>
              </div>
            </div>
            <div class="card">
              <h3><i class="fa-solid fa-history"></i> Sales History</h3>
              <div class="search-bar">
                <input type="text" id="search-sales" placeholder="Search invoice or customer..." oninput="filterSales()">
                <select id="filter-sale-method" onchange="filterSales()">
                  <option value="">All Methods</option>
                  <option value="cash">Cash</option>
                  <option value="mpesa">M-Pesa</option>
                  <option value="bank">Bank</option>
                  <option value="credit">Credit</option>
                </select>
                <button class="btn btn-yellow btn-sm" onclick="exportSalesExcel()"><i class="fa-solid fa-file-excel"></i> Export</button>
              </div>
              <div class="overflow-x">
                <table>
                  <thead><tr><th>Invoice #</th><th>Customer</th><th>Total (KES)</th><th>Method</th><th>Status</th><th>Served By</th><th>Date</th><th>Actions</th></tr></thead>
                  <tbody id="sales-table"></tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- ADJUSTMENTS -->
          <div class="page" id="page-adjustments">
            <div class="page-title"><i class="fa-solid fa-sliders"></i> Stock Adjustments</div>
            <div class="card">
              <h3><i class="fa-solid fa-plus"></i> New Adjustment</h3>
              <div class="alert" id="alert-adj"></div>
              <div class="form-row">
                <div class="form-group" style="flex:2 1 220px"><label>Product *</label><select id="adj-product"><option value="">Select product...</option></select></div>
                <div class="form-group"><label>Type *</label>
                  <select id="adj-type">
                    <option value="damage">Damage / Write-off</option>
                    <option value="expiry">Expiry Write-off</option>
                    <option value="return_out">Return to Supplier</option>
                    <option value="stock_take_deficit">Stock Take — Deficit</option>
                    <option value="stock_take_surplus">Stock Take — Surplus</option>
                    <option value="return_in">Customer Return (In)</option>
                  </select>
                </div>
                <div class="form-group"><label>Quantity *</label><input type="number" id="adj-qty" min="0.01" step="0.01" placeholder="e.g. 5"></div>
                <div class="form-group" style="flex:2 1 240px"><label>Reason / Notes *</label><input type="text" id="adj-reason" placeholder="e.g. Dropped crate, stock count discrepancy..."></div>
              </div>
              <div id="adj-direction-hint" style="font-size:0.8em;color:#9ca3af;margin-bottom:12px"></div>
              <button class="btn" onclick="saveAdjustment()"><i class="fa-solid fa-floppy-disk"></i> Save Adjustment</button>
            </div>
            <div class="card">
              <h3><i class="fa-solid fa-history"></i> Adjustment History</h3>
              <div class="search-bar">
                <input type="text" id="search-adj" placeholder="Search..." oninput="filterAdj()">
                <select id="filter-adj-type" onchange="filterAdj()">
                  <option value="">All Types</option>
                  <option value="damage">Damage</option>
                  <option value="expiry">Expiry</option>
