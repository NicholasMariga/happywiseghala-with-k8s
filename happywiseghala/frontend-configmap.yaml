          <div class="form-group" style="flex:1 1 100%"><label>Name *</label><input type="text" id="edit-cust-name"></div>
          <div class="form-group"><label>Phone</label><input type="text" id="edit-cust-phone"></div>
          <div class="form-group"><label>Email</label><input type="text" id="edit-cust-email"></div>
          <div class="form-group"><label>Credit Limit (KES)</label><input type="number" id="edit-cust-limit"></div>
          <div class="form-group" style="flex:1 1 100%"><label>Notes</label><input type="text" id="edit-cust-notes"></div>
        </div>
        <button class="btn" onclick="saveEditCustomer()"><i class="fa-solid fa-floppy-disk"></i> Save</button>
      </div>
    </div>

    <script src="/app.js"></script>
    </body>
    </html>
