apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-frontend
  namespace: happywiseghala
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-frontend
  template:
    metadata:
      labels:
        app: nginx-frontend
    spec:
      containers:
      - name: nginx-frontend
        image: nginx:1.21
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
        - name: styles-volume
          mountPath: /usr/share/nginx/html/styles.css
          subPath: styles.css
        - name: js-volume
          mountPath: /usr/share/nginx/html/app.js
          subPath: app.js
        - name: config-volume
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: html-volume
        configMap:
          name: nginx-html
          items:
          - key: index.html
            path: index.html
      - name: styles-volume
        configMap:
          name: nginx-styles
          items:
          - key: styles.css
            path: styles.css
      - name: js-volume
        configMap:
          name: nginx-js
          items:
          - key: app.js
            path: app.js
      - name: config-volume
        configMap:
          name: nginx-html
          items:
          - key: nginx.conf
            path: default.conf
